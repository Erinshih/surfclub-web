<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-v2.png">
  <link
    rel="manifest"
    href="./manifest.webmanifest"
  >
  <title>Surf Club｜登入</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-page">
  <header class="site-header">
    <nav class="navbar">
      <a class="brand" href="./index.html">Surf Club</a>
      <!-- <a href="./index.html">返回首頁</a> -->
    </nav>
  </header>

  <main class="auth-main">
    <form id="login-form" class="form-card" novalidate>
      <p class="eyebrow">MEMBER SIGN IN</p>
      <h1>社員登入</h1>
      <p class="form-description">請使用 Firebase Authentication 中建立的 Email 與密碼登入。</p>

      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        autocomplete="username"
        required
      >

      <label for="password">密碼</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        required
      >

      <button id="login-button" class="button button-block" type="submit">
        登入
      </button>

      <p id="message" class="status-message" aria-live="polite"></p>
    </form>
  </main>

  <script type="module" src="./js/login.js"></script>

  <p class="form-footer">
  還沒有帳號？
  <a href="./register.html">
    申請成為社員
  </a>
</p>
</body>
</html>
