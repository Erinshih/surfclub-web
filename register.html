<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Surf Club｜社員註冊</title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  >
</head>

<body class="auth-page">
  <header class="site-header">
    <nav class="navbar">
      <a class="brand" href="./index.html">
        Surf Club
      </a>

      <div class="nav-links">
        <a href="./login.html">
          已有帳號
        </a>

        <a href="./index.html">
          返回首頁
        </a>
      </div>
    </nav>
  </header>

  <main class="auth-main">
    <form
      id="register-form"
      class="form-card"
      novalidate
    >
      <p class="eyebrow">
        MEMBER REGISTRATION
      </p>

      <h1>社員註冊</h1>

      <p class="form-description">
        註冊完成後，需要等待管理員審核，
        通過後才能查看社員公告。
      </p>

      <label for="name">
        姓名
      </label>

      <input
        id="name"
        name="name"
        type="text"
        maxlength="50"
        autocomplete="name"
        required
      >

      <label for="student-id">
        學號
      </label>

      <input
        id="student-id"
        name="studentId"
        type="text"
        maxlength="20"
        required
      >

      <label for="email">
        Email
      </label>

      <input
        id="email"
        name="email"
        type="email"
        autocomplete="username"
        required
      >

      <label for="password">
        密碼
      </label>

      <input
        id="password"
        name="password"
        type="password"
        minlength="6"
        autocomplete="new-password"
        required
      >

      <label for="confirm-password">
        確認密碼
      </label>

      <input
        id="confirm-password"
        name="confirmPassword"
        type="password"
        minlength="6"
        autocomplete="new-password"
        required
      >

      <button
        id="register-button"
        class="button button-block"
        type="submit"
      >
        送出註冊申請
      </button>

      <p
        id="message"
        class="status-message"
        aria-live="polite"
      ></p>

      <p class="form-footer">
        已經有帳號？
        <a href="./login.html">前往登入</a>
      </p>
    </form>
  </main>

  <script
    type="module"
    src="./js/register.js"
  ></script>
</body>
</html>
