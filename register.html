
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-v2.png">
  <link
    rel="manifest"
    href="./manifest.webmanifest"
  >

  <title>Surf Club｜社員申請</title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  >
</head>

<body class="auth-page">
  <header class="site-header">
    <nav class="navbar">
      <a
        class="brand"
        href="./index.html"
      >
        SURF CLUB
      </a>

      <div class="nav-links">
        <a href="./index.html">
          返回首頁
        </a>

        <a href="./login.html">
          社員登入
        </a>
      </div>
    </nav>
  </header>

  <main class="auth-main auth-main-wide">
    <form
      id="register-form"
      class="form-card"
      enctype="multipart/form-data"
    >
      <p class="eyebrow">
        MEMBER APPLICATION
      </p>

      <h1>
        申請成為社員
      </h1>

      <p class="form-description">
        請填寫社員資料並上傳匯款截圖。
        管理員確認資料與社費後，才會通過社員認證。
      </p>

      <div class="form-grid">
        <label class="field-stack">
          <span>
            姓名 *
          </span>

          <input
            id="name"
            name="name"
            type="text"
            maxlength="50"
            autocomplete="name"
            required
          >
        </label>

        <label class="field-stack">
          <span>
            學號 *
          </span>

          <input
            id="student-id"
            name="studentId"
            type="text"
            maxlength="30"
            required
          >
        </label>

        <label class="field-stack">
          <span>
            系級 *
          </span>

          <input
            id="department"
            name="department"
            type="text"
            maxlength="80"
            placeholder="例如：電機四甲"
            required
          >
        </label>

        <label class="field-stack">
          <span>
            電話 *
          </span>

          <input
            id="phone"
            name="phone"
            type="tel"
            maxlength="30"
            autocomplete="tel"
            required
          >
        </label>

        <label class="field-stack">
          <span>
            Email *
          </span>

          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
          >
        </label>

        <!-- <label class="field-stack">
          <span>
            匯款截圖 *
          </span>

          <input
            id="payment-proof"
            name="paymentProof"
            type="file"
            accept="image/jpeg,image/png,image/webp"
            required
          >
        </label> -->

        <label class="field-stack">
          <span>
            密碼 *
          </span>

          <input
            id="password"
            name="password"
            type="password"
            minlength="6"
            autocomplete="new-password"
            required
          >
        </label>

        <label class="field-stack">
          <span>
            再次輸入密碼 *
          </span>

          <input
            id="confirm-password"
            name="confirmPassword"
            type="password"
            minlength="6"
            autocomplete="new-password"
            required
          >
        </label>
      </div>

      <p class="privacy-note">
  送出申請後，請等待管理員確認社員資料與社費狀態。
</p>

      <button
        id="register-button"
        class="button button-block"
        type="submit"
      >
        送出社員申請
      </button>

      <p
        id="message"
        class="status-message"
        aria-live="polite"
      ></p>
    </form>
  </main>

  <script
    type="module"
    src="./js/register.js"
  ></script>
</body>
</html>
