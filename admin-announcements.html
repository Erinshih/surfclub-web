
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-v2.png">

  <title>Surf Club Admin｜公告管理</title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  >
</head>

<body>
  <header class="site-header">
    <nav class="navbar">
      <a
        class="brand"
        href="./admin.html"
      >
        SURF CLUB ADMIN
      </a>

      <div class="nav-links">
        <a href="./admin.html">
          管理首頁
        </a>

        <a href="./admin-announcements.html">
          公告管理
        </a>

        <a href="./admin-courses.html">
          社課管理
        </a>

        <a href="./admin-members.html">
          社員管理
        </a>

        <!-- <a href="./index.html">
          公開網站
        </a> -->

        <button
          id="logout-button"
          class="button button-small button-secondary"
          type="button"
        >
          登出
        </button>
      </div>
    </nav>
  </header>

  <main class="dashboard">
    <section class="dashboard-header">
      <div>
        <p class="eyebrow">
          ANNOUNCEMENT MANAGEMENT
        </p>

        <h1>
          公告管理
        </h1>
      </div>

      <p
        id="admin-status"
        class="status-message"
      >
        正在驗證管理員身分……
      </p>
    </section>

    <div
      id="admin-content"
      class="hidden"
    >
      <!-- ===============================================
           新增公告
           =============================================== -->

      <section class="content-card">
        <h2>
          發布新公告
        </h2>

        <form id="announcement-form">
          <label class="field-stack">
            <span>
              公告標題 *
            </span>

            <input
              id="announcement-title"
              type="text"
              maxlength="100"
              placeholder="例如：外衝活動開始報名"
              required
            >
          </label>

          <label class="field-stack">
            <span>
              公告內容 *
            </span>

            <textarea
              id="announcement-content"
              maxlength="3000"
              placeholder="請輸入公告內容"
              required
            ></textarea>
          </label>

          <div class="form-grid">
            <label class="field-stack">
              <span>
                連結文字（選填）
              </span>

              <input
                id="announcement-link-text"
                type="text"
                maxlength="80"
                placeholder="例如：填寫外衝報名表"
              >
            </label>

            <label class="field-stack">
              <span>
                網址（選填）
              </span>

              <input
                id="announcement-link-url"
                type="text"
                maxlength="1000"
                placeholder="https://forms.gle/xxxx"
              >
            </label>
          </div>

          <p class="form-description">
            網址可以輸入完整的 https:// 網址；
            若只輸入 forms.gle/xxxx，系統會自動補上 https://。
          </p>

          <button
            id="publish-button"
            class="button"
            type="submit"
          >
            發布公告
          </button>

          <p
            id="announcement-form-message"
            class="status-message"
            aria-live="polite"
          ></p>
        </form>
      </section>

      <!-- ===============================================
           目前公告
           =============================================== -->

      <section class="content-card">
        <div class="section-heading left">
          <p class="eyebrow">
            CURRENT ANNOUNCEMENTS
          </p>

          <h2>
            目前公告
          </h2>
        </div>

        <div id="announcement-list">
          <p class="empty-state">
            正在載入公告……
          </p>
        </div>
      </section>
    </div>
  </main>

  <script
    type="module"
    src="./js/admin-announcements.js"
  ></script>
</body>
</html>
