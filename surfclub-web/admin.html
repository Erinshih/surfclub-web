<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surf Club｜管理員後台</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a class="brand" href="./index.html">Surf Club 管理後台</a>
      <div class="nav-links">
        <a href="./index.html">公開首頁</a>
        <button id="logout-button" class="button button-small button-secondary" type="button">
          登出
        </button>
      </div>
    </nav>
  </header>

  <main class="dashboard">
    <section class="dashboard-header card">
      <div>
        <p class="eyebrow">ADMIN DASHBOARD</p>
        <h1>管理員後台</h1>
        <p id="admin-status" class="status-message">正在驗證管理員身分……</p>
      </div>
    </section>

    <section id="announcement-form-section" class="card hidden">
      <h2>新增公告</h2>

      <form id="announcement-form">
        <label for="title">公告標題</label>
        <input
          id="title"
          name="title"
          type="text"
          maxlength="100"
          required
        >

        <label for="content">公告內容</label>
        <textarea
          id="content"
          name="content"
          maxlength="2000"
          required
        ></textarea>

        <button id="publish-button" class="button" type="submit">
          發布公告
        </button>

        <p id="form-message" class="status-message" aria-live="polite"></p>
      </form>
    </section>

    <section>
      <div class="section-heading left">
        <p class="eyebrow">ANNOUNCEMENTS</p>
        <h2>公告管理</h2>
      </div>

      <div id="announcement-list">
        <p>正在讀取公告……</p>
      </div>
    </section>
  </main>

  <script type="module" src="./js/admin.js"></script>

  <section class="card">
  <div class="section-heading left">
    <p class="eyebrow">
      MEMBER APPLICATIONS
    </p>

    <h2>社員申請審核</h2>
  </div>

  <div id="pending-member-list">
    <p>正在讀取待審核社員……</p>
  </div>
</section>
</body>
</html>
