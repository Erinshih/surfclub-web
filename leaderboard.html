<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-v2.png">
  
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#315f65"
  >

  <title>積分榜｜Surf Club</title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  >
</head>

<body class="leaderboard-body">

  <header class="site-header">
    <div class="site-header-inner">

      <a
        class="site-brand"
        href="./member.html"
      >
        <span class="site-brand-mark">
          SC
        </span>

        <span class="site-brand-text">
          <strong>Surf Club</strong>
          <small>社員資訊系統</small>
        </span>
      </a>

      <nav class="site-nav">
        <a href="./member.html">
          社員首頁
        </a>

        <a href="./courses.html">
          社課資訊
        </a>

        <a
          class="active"
          href="./leaderboard.html"
        >
          積分榜
        </a>

        <button
          id="logoutButton"
          class="site-nav-logout"
          type="button"
        >
          登出
        </button>
      </nav>

    </div>
  </header>

  <main class="leaderboard-page">

    <section class="leaderboard-hero">

      <div class="leaderboard-hero-copy">
        <p class="leaderboard-eyebrow">
          SURF CLUB POINTS
        </p>

        <h1>
          社員積分榜
        </h1>

        <p class="leaderboard-description">
          查看社員個人積分排名，以及各家系累積積分排名。
          所有積分皆由管理員統一設定與更新。
        </p>
      </div>

      <div class="leaderboard-hero-decoration">
        <span class="wave-circle wave-circle-one"></span>
        <span class="wave-circle wave-circle-two"></span>

        <div class="leaderboard-hero-icon">
          🏄
        </div>
      </div>

    </section>

    <section class="leaderboard-panel">

      <div
        class="leaderboard-tabs"
        role="tablist"
        aria-label="積分榜分類"
      >

        <button
          id="personalTabButton"
          class="leaderboard-tab active"
          type="button"
          role="tab"
          aria-selected="true"
          aria-controls="personalLeaderboard"
        >
          <span class="leaderboard-tab-icon">
            👤
          </span>

          <span>
            個人積分
          </span>
        </button>

        <button
          id="familyTabButton"
          class="leaderboard-tab"
          type="button"
          role="tab"
          aria-selected="false"
          aria-controls="familyLeaderboard"
        >
          <span class="leaderboard-tab-icon">
            🌊
          </span>

          <span>
            家系積分
          </span>
        </button>

      </div>

      <div
        id="leaderboardLoading"
        class="leaderboard-loading"
      >
        <div class="leaderboard-spinner"></div>

        <span>
          正在載入積分資料……
        </span>
      </div>

      <div
        id="leaderboardError"
        class="leaderboard-error"
        hidden
      ></div>

      <section
        id="personalLeaderboard"
        class="leaderboard-content"
        role="tabpanel"
      >

        <div class="leaderboard-section-header">

          <div>
            <p class="leaderboard-section-eyebrow">
              PERSONAL RANKING
            </p>

            <h2>
              個人積分排名
            </h2>
          </div>

          <span class="leaderboard-section-note">
            點選社員姓名可查看 Level 曲線與成就紀錄
          </span>

        </div>

        <div
          id="personalRankingList"
          class="ranking-list"
        ></div>

        <section
          id="memberDetailPanel"
          class="member-detail-panel"
          hidden
        >
          <div class="member-detail-panel-header">
            <div>
              <p class="leaderboard-section-eyebrow">
                MEMBER ACHIEVEMENTS
              </p>

              <h2 id="selectedMemberName">
                社員成就紀錄
              </h2>

              <p
                id="selectedMemberMeta"
                class="section-description"
              ></p>
            </div>

            <button
              id="closeMemberDetail"
              class="button button-small button-secondary"
              type="button"
            >
              關閉
            </button>
          </div>

          <div class="level-chart-box">
            <canvas id="selectedMemberLevelChart"></canvas>
          </div>

          <div
            id="selectedMemberAchievementList"
            class="achievement-timeline"
          >
            <p class="empty-state">
              尚無成就紀錄
            </p>
          </div>
        </section>

      </section>

      <section
        id="familyLeaderboard"
        class="leaderboard-content"
        role="tabpanel"
        hidden
      >

        <div class="leaderboard-section-header">

          <div>
            <p class="leaderboard-section-eyebrow">
              FAMILY RANKING
            </p>

            <h2>
              家系積分排名
            </h2>
          </div>

          <span class="leaderboard-section-note">
            自動加總家系成員積分，並顯示家系成員
          </span>

        </div>

        <div
          id="familyRankingList"
          class="ranking-list"
        ></div>

      </section>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script
    type="module"
    src="./js/leaderboard.js"
  ></script>

</body>
</html>
