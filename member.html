
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Surf Club｜社員首頁</title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  >
</head>

<body>
  <header class="site-header">
    <nav class="navbar">
      <a
        class="brand"
        href="./index.html"
      >
        Surf Club 社員首頁
      </a>

      <div class="nav-links">
        <a href="./index.html">
          公開首頁
        </a>

        <a href="./courses.html">
          社課資訊
        </a>

        <button
          id="logout-button"
          class="button button-small button-secondary"
          type="button"
        >
          登出
        </button>
      </div>
    </nav>
  </header>

  <main class="dashboard">
    <!-- =================================================
         社員登入狀態
         ================================================= -->
    <section class="dashboard-header card">
      <div>
        <p class="eyebrow">
          MEMBER DASHBOARD
        </p>

        <h1>
          社員首頁
        </h1>

        <p
          id="member-status"
          class="status-message"
          aria-live="polite"
        >
          正在驗證社員身分……
        </p>
      </div>
    </section>

    <!-- =================================================
         社員個人資料
         ================================================= -->
    <section class="card member-profile-card">
      <div class="section-heading left">
        <p class="eyebrow">
          MEMBER PROFILE
        </p>

        <h2>
          我的社員資料
        </h2>

        <p class="section-description">
          Level 與家系由管理員設定。
          若資料有誤，請聯絡社團管理員。
        </p>
      </div>

      <div class="member-profile-grid">
        <div class="member-profile-item">
          <span class="member-profile-label">
            姓名
          </span>

          <strong id="member-name">
            載入中……
          </strong>
        </div>

        <div class="member-profile-item">
          <span class="member-profile-label">
            Email
          </span>

          <strong id="member-email">
            載入中……
          </strong>
        </div>

        <div class="member-profile-item">
          <span class="member-profile-label">
            Level
          </span>

          <strong
            id="member-level"
            class="member-level-badge"
          >
            尚未設定
          </strong>
        </div>

        <div class="member-profile-item">
          <span class="member-profile-label">
            家系
          </span>

          <strong
            id="member-family"
            class="member-family-badge"
          >
            尚未分配
          </strong>
        </div>
      </div>

      <p
        id="member-profile-message"
        class="status-message"
        aria-live="polite"
      ></p>
    </section>

    <!-- =================================================
         最新公告
         ================================================= -->
    <section class="card">
      <div class="section-heading left">
        <p class="eyebrow">
          ANNOUNCEMENTS
        </p>

        <h2>
          最新公告
        </h2>
      </div>

      <div id="announcement-list">
        <p class="empty-state">
          正在讀取公告……
        </p>
      </div>
    </section>
  </main>

  <script
    type="module"
    src="./js/member.js"
  ></script>
</body>
</html>
