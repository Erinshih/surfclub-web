
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-v2.png">
  <link
    rel="manifest"
    href="./manifest.webmanifest"
  >

  <meta
    name="theme-color"
    content="#315f65"
  >

  <meta
    name="description"
    content="Surf Club 社員資訊系統"
  >

  <title>Surf Club｜社員資訊系統</title>

  <!-- 這行不能刪除 -->
  <link
    rel="stylesheet"
    href="./css/style.css"
  >
</head>

<body>
  <!-- =====================================================
       社員頁導覽列
       ===================================================== -->

  <header class="site-header">
    <nav class="navbar">
      <a
        class="brand"
        href="./member.html"
      >
        <span class="brand-mark-small">
          <!-- ◉ -->
        </span>

        Surf Club 社員系統
      </a>

      <div class="nav-links">
        <a
          class="active"
          href="./member.html"
        >
          社員首頁
        </a>

        <a href="./courses.html">
          社課資訊
        </a>

        <a href="./leaderboard.html">
          積分榜
        </a>

        <button
          id="logout-button"
          class="button button-small button-secondary"
          type="button"
        >
          登出
        </button>
      </div>
    </nav>
  </header>

  <!-- =====================================================
       社員資訊系統
       ===================================================== -->

  <main class="member-dashboard">
    <!-- 歡迎區 -->
    <section class="member-welcome-card">
      <div>
        <p class="eyebrow">
          MEMBER DASHBOARD
        </p>

        <h1>
          Surf Club 社員資訊系統
        </h1>

        <p
          id="member-status"
          class="status-message"
        >
          正在驗證社員資料……
        </p>
      </div>
    </section>

    <!-- ===================================================
         Level 與家系
         =================================================== -->

    <section class="member-summary-grid">
      <article class="member-summary-card">
        <span class="member-summary-label">
          我的 Level
        </span>

        <strong id="member-level">
          載入中……
        </strong>
      </article>

      <article class="member-summary-card">
        <span class="member-summary-label">
          我的家系
        </span>

        <strong id="member-family">
          載入中……
        </strong>
      </article>
    </section>

    <!-- ===================================================
         社員個人資料
         =================================================== -->

    <section class="content-card">
      <div class="section-heading left">
        <p class="eyebrow">
          MEMBER PROFILE
        </p>

        <h2>
          我的社員資料
        </h2>

        <p class="section-description">
          Level 與家系由管理員設定。
          若社員資料有誤，請聯絡社團管理員。
        </p>
      </div>

      <div class="member-profile-grid member-profile-grid-compact">
        <article class="member-profile-item">
          <span>
            姓名
          </span>

          <strong id="member-name">
            載入中……
          </strong>
        </article>

        <article class="member-profile-item">
          <span>
            Email
          </span>

          <strong id="member-email">
            載入中……
          </strong>
        </article>
      </div>
    </section>

    <section class="member-achievement-section">
  <h2>Level 成長紀錄</h2>

  <div class="level-chart-box">
  <canvas id="level-history-chart"></canvas>
</div>
</section>

<section class="member-achievement-section">
  <h2>成就解鎖紀錄</h2>

  <div
    id="achievement-timeline"
    class="achievement-timeline"
  >
    <p class="empty-state">
      尚無成就紀錄
    </p>
  </div>
</section>

    <!-- ===================================================
         最新公告
         =================================================== -->
</main>
    <section class="content-card">
      <div class="section-heading left">
        <p class="eyebrow">
          ANNOUNCEMENTS
        </p>

        <h2>
          最新公告
        </h2>
      </div>

      <div id="announcement-list">
        <p class="empty-state">
          正在載入公告……
        </p>
      </div>
    </section>


  <!-- =====================================================
       JavaScript
       ===================================================== -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script
  type="module"
  src="./js/member.js"
></script>

<!-- 有做 PWA 時才保留 -->
<script
  type="module"
  src="./js/register.js"
></script>
</body>
</html>
